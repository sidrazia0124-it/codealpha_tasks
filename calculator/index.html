
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Neon Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="calculator glass">
        <div class="display-container">
            <input type="text" id="screen" readonly placeholder="0">
        </div>
        
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearScreen()">C</button>
            <button class="btn btn-operator" onclick="appendValue('/')">&divide;</button>
            <button class="btn btn-operator" onclick="appendValue('*')">&times;</button>
            <button class="btn btn-operator" onclick="deleteLast()">&larr;</button>

            <button class="btn" onclick="appendValue('7')">7</button>
            <button class="btn" onclick="appendValue('8')">8</button>
            <button class="btn" onclick="appendValue('9')">9</button>
            <button class="btn btn-operator" onclick="appendValue('-')">-</button>

            <button class="btn" onclick="appendValue('4')">4</button>
            <button class="btn" onclick="appendValue('5')">5</button>
            <button class="btn" onclick="appendValue('6')">6</button>
            <button class="btn btn-operator" onclick="appendValue('+')">+</button>

            <button class="btn" onclick="appendValue('1')">1</button>
            <button class="btn" onclick="appendValue('2')">2</button>
            <button class="btn" onclick="appendValue('3')">3</button>
            <button class="btn btn-equal" onclick="calculateResult()">=</button>

            <button class="btn btn-zero" onclick="appendValue('0')">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Sidra Zia | Department of IT | The Women University Multan</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
