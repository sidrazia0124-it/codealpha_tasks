<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="player-container glass">
        <div class="top-bar">
            <span><i class="fas fa-chevron-down"></i> Now Playing</span>
            <span><i class="fas fa-list"></i></span>
        </div>

        <div class="img-area">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500" alt="Album Art" id="track-art">
        </div>

        <div class="song-details">
            <h2 id="track-title">Cyber Beats</h2>
            <p id="track-artist">Future Producer</p>
        </div>

        <div class="progress-area">
            <input type="range" id="progress-bar" min="0" max="100" value="0" onchange="changeDuration()">
            <div class="time-duration">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button id="prev" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
            <button id="play-pause" class="play-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button id="next" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
        </div>

        <div class="volume-area">
            <i class="fas fa-volume-low"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="80" onchange="setVolume()">
            <i class="fas fa-volume-high"></i>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Sidra Zia | Department of IT | The Women University Multan</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
